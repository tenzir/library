id: slack
name: Send to Slack
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://raw.githubusercontent.com/tenzir/library/main/slack/package.svg

description: |
  The [Slack](https://slack.com) package makes it easy to send data from a
  workflow to a Slack channel using incoming webhooks, enabling real-time
  security alerts and notifications. Configure the package with your Slack app's
  webhook URL to forward critical events, detection results, or aggregated
  metrics directly to your team's communication channels.

  Operators:
  - `slack::send` sends one Slack webhook request per event. Omit `message` to
    serialize the current event, or pass a string expression for custom text.
    Pass `thread_ts` to reply in an existing thread.
  - `slack::alert` sends events as structured Slack alert messages with a title,
    optional message, optional severity context, and optional thread reply.
categories:
- destinations
