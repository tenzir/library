id: splunk
name: Splunk
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://raw.githubusercontent.com/tenzir/library/main/splunk/package.svg
description: |
  This package maps between [Splunk](https://www.splunk.com) Common Information
  Model (CIM) field shapes and Open Cybersecurity Schema Framework (OCSF)
  events.

  Use `splunk::cim::map` to transform supported OCSF 1.8 event classes into
  Splunk CIM datasets, and `splunk::ocsf::map` to transform supported Splunk
  CIM datasets back into OCSF. These compatibility operators help reuse
  detection logic, analytics, and routing pipelines across systems that expect
  either schema.
categories:
- destinations
- mappings
