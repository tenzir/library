description: |
  [abuse.ch](https://abuse.ch/) operates community threat intelligence feeds
  for malware infrastructure, malware samples, malicious URLs, malicious TLS
  certificates, and indicators of compromise.

  This package provides reusable operators for collecting Feodo Tracker,
  MalwareBazaar, SSLBL, ThreatFox, and URLhaus feeds and normalizing their
  indicators to OCSF OSINT Inventory Info events.

