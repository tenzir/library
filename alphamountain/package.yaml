id: alphamountain
name: alphaMountain
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: |
  https://raw.githubusercontent.com/tenzir/library/main/alphamountain/package.svg

description: |
  [alphaMountain](https://alphamountain.ai) provides up-to-date domain and IP
  intelligence for cybersecurity investigational and protection platforms.

  This package provides reusable operators for alphaMountain real-time APIs,
  feeds, batch diffs, support endpoints, category metadata, and OCSF OSINT
  Inventory Info mapping.
categories:
- sources
- mappings
- contexts

contexts:
  alphamountain-threats:
    type: lookup-table
    description: alphaMountain threat feed records keyed by hostname.
  alphamountain-categories:
    type: lookup-table
    description: alphaMountain category feed records keyed by hostname.
  alphamountain-category-map:
    type: lookup-table
    description: alphaMountain category metadata keyed by category ID.
  alphamountain-ocsf-osint:
    type: lookup-table
    description: alphaMountain OCSF OSINT objects keyed by indicator value.
