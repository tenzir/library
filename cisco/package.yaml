package_icon: https://raw.githubusercontent.com/tenzir/library/main/cisco/package.svg

description: |
  [Cisco](https://www.cisco.com/) security products produce network and
  activity telemetry for infrastructure, identity, and cloud security
  workflows.

  This package provides reusable operators for Cisco Umbrella DNS logs—reading
  the standard DNS CSV export from files or S3, publishing normalized Umbrella
  events, and mapping them to OCSF DNS Activity events—and for Cisco Identity
  Services Engine (ISE): a parser that normalizes the remote-target message
  format, an operator that reassembles multi-segment messages, and a mapper that
  turns ISE events into OCSF Authentication, Network Activity, and Base Events.

categories:
