package_icon: https://raw.githubusercontent.com/tenzir/library/main/cisco/package.svg

description: |
  [Cisco](https://www.cisco.com/) security products produce network and
  activity telemetry for infrastructure, identity, and cloud security
  workflows.

  This package provides reusable operators for Cisco security products:

  - **Umbrella DNS**: reading the standard DNS CSV export from files or S3,
    publishing normalized Umbrella events, and mapping them to OCSF DNS
    Activity events.
  - **Secure Firewall ASA**: parsing ASA syslog messages and mapping
    supported message IDs to OCSF events.

categories:
