description: |
  [Zscaler Internet Access (ZIA)](https://www.zscaler.com/products-and-solutions/zscaler-internet-access)
  is a cloud-native secure web gateway that provides comprehensive security for
  users accessing the internet from any location or device.

  This package enables ingestion and processing of ZIA NSS web logs, providing
  visibility into your organization's internet activity and security posture.
  The package includes OCSF mapping examples that transform ZIA proxy events
  into standardized formats, making it easy to correlate Zscaler data with
  other security tools in your environment.
