id: google
name: Google
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://raw.githubusercontent.com/tenzir/library/main/google/package.svg
description: |
  This package maps between [Google SecOps](https://cloud.google.com/security/products/security-operations)
  Unified Data Model (UDM) event and entity records and Open Cybersecurity
  Schema Framework (OCSF) 1.8.0 events.

  Use `google::udm::map` to transform OCSF 1.8.0 event classes into Google
  SecOps UDM records, and `google::ocsf::map` to transform UDM event and
  entity records back into OCSF. The package preserves source fields that do
  not have a first-class target field under `additional` for UDM output and
  under `unmapped` for OCSF output.
categories:
- destinations
- mappings
