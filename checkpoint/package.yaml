id: checkpoint
name: Check Point
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://raw.githubusercontent.com/tenzir/library/main/checkpoint/package.svg

description: |
  [Check Point](https://www.checkpoint.com/) firewalls emit traffic and
  detection logs both as structured records and as syslog exports.

  This package parses raw Check Point syslog, normalizes Check Point firewall
  records into the `checkpoint.firewall.*` schema family, and maps common
  traffic and detection events to OCSF.
categories:
- mappings
- sources

inputs:
  syslog-url:
    name: Syslog URL
    description: >
      The endpoint (including URL scheme) where Check Point sends syslog. The
      default port 514 requires elevated privileges on most systems. Use an
      unprivileged port like udp://0.0.0.0:5514 if running without root.
    type: string
    default: udp://0.0.0.0:514
