id: foxio
name: FoxIO JA4+
author: Tenzir
author_icon: |
  https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: |
  https://raw.githubusercontent.com/tenzir/library/main/foxio/package.svg

description: |
  The [FoxIO JA+ Database](https://ja4db.com/) provides context for various JA+
  fingerprints, such as operating system, device, library, user agent.

  This package provides operators for fetching the database, updating JA4+
  enrichment contexts, and normalizing fingerprints to OCSF OSINT Inventory Info
  events.
categories:
- contexts
