id: named
name: ISC BIND named
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://www.isc.org/images/isclogos/Bind_9_Mark_ISC_Blue.png

description: |
  [BIND](https://www.isc.org/bind/) is ISC's DNS server. The `named` daemon is
  its authoritative and recursive DNS service.

  This package parses `named` log records with `time` and raw `message` fields,
  preserves the raw message body as `raw_data`, and maps normalized records to
  OCSF events.

  Current structural mapping focuses on BIND query logging messages, including
  regular client queries, view-qualified queries, query failures, and
  cache/client query denials, which are emitted as OCSF DNS Activity. Zone
  loading, resolver, DNSSEC, startup, shutdown, and other daemon diagnostics are
  retained as OCSF Base Event records so downstream pipelines can route or
  inspect them without mistaking them for DNS activity.
categories:
- mappings
