id: tenzir
name: Tenzir Utilities
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://raw.githubusercontent.com/tenzir/library/main/tenzir/package.svg

description: |
  Utility operators maintained by Tenzir for common event-processing tasks.

  This package currently provides helpers for enriching OCSF-shaped events with
  OSINT objects and trimming OCSF events for downstream storage or transport.

categories:
- contexts
- mappings

inputs:
  osint-input-topic:
    name: OCSF OSINT Inventory Info topic
    description: |
      The topic to subscribe to and extract OSINT Inventory Info events.
    default: ocsf

  enrich-input-topic:
    name: Enrichment input topic
    description: |
      The topic to subscribe to and enrich with OSINT objects.
    default: ocsf

  enrich-output-topic:
    name: Enrichment output topic
    description: |
      The topic to publish to after enriching events with OSINT objects.
    default: ocsf-osint

  max-ioc-age:
    name: Maximum IOC age
    description: |
      The maximum age of an OSINT lookup-table entry before eviction.
    default: 30d

  input-topic:
    name: Trim input topic
    description: Topic to subscribe to for OCSF events.
    default: ocsf

  output-topic:
    name: Trim output topic
    description: Topic to publish trimmed OCSF events to.
    default: ocsf-trimmed

  size:
    name: Trim size
    description: Must be one of S, M, or L.
    default: M

contexts:
  ocsf-osint:
    type: lookup-table
    description: |
      A lookup table that maps IOC values to OCSF OSINT objects.
