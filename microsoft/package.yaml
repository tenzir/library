description: |
  [Microsoft](https://www.microsoft.com) produces a broad range of enterprise
  products, from Windows endpoints and Active Directory to Azure cloud services,
  Microsoft 365, and Defender security tooling, each generating its own
  telemetry and log formats.

  This package provides operators that parse Microsoft product logs, collect
  Microsoft Graph telemetry, and map them to OCSF and Microsoft Sentinel ASIM.
  The package covers native
  [Windows Event Log](https://learn.microsoft.com/en-us/windows/win32/wes/windows-event-log)
  events from the Application, Security, and System channels, and Microsoft
  Graph endpoints for Entra ID sign-ins and directory audits, Defender alerts
  and incidents, Identity Protection risk data, and Intune inventory and
  compliance data.
categories:
