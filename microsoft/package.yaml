description: |
  [Microsoft](https://www.microsoft.com) produces a broad range of enterprise
  products, from Windows endpoints and Active Directory to Azure cloud services,
  Microsoft 365, and Defender security tooling, each generating its own
  telemetry and log formats.

  This package provides operators that parse Microsoft product logs and map them
  to OCSF. The current scope covers native
  [Windows Event Log](https://learn.microsoft.com/en-us/windows/win32/wes/windows-event-log)
  events from the Application, Security, and System channels, with support for
  providers such as *Microsoft-Windows-Security-Auditing*, *Service Control
  Manager*, *EventLog*, and *Application Error*.
categories:
- mappings
