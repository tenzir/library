id: dhcpd
name: ISC DHCPD
author: Tenzir
author_icon: https://raw.githubusercontent.com/tenzir/library/main/.tenzir.svg
package_icon: https://www.isc.org/images/isclogos/ISC-logo-for-web.png

description: |
  [ISC DHCPD](https://www.isc.org/dhcp/) is the classic ISC DHCP server.

  This package parses ISC `dhcpd` log records with `time` and raw `message`
  fields, preserves the raw message body as `raw_data`, and maps normalized DHCP
  transaction records to OCSF DHCP Activity.

  Current structural parsing focuses on DHCPv4, DHCP4o6, BOOTP, and DHCPv6
  protocol transaction messages. The package currently does not structurally
  parse failover binding-update messages, lease cache/reuse decisions, pool
  threshold and adaptive lease-time diagnostics, debug lease-selection traces,
  or daemon/config/internal diagnostics. Unsupported lines are retained as OCSF
  Base Event records so downstream pipelines can route or inspect them without
  mistaking them for DHCP activity.
categories:
- mappings
